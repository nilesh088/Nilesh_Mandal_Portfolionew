<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nilesh Mandal – Mechanical Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<style>
:root {
  --bg: #0d0d0d;
  --surface: #141414;
  --accent: #e8c547;
  --text: #f0ede6;
  --muted: #888;
  --border: #2a2a2a;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
}

/* NAV /
nav {
  position: fixed;
  width: 100%;
  padding: 20px 40px;
  display:flex;
  justify-content: space-between;
}

.nav-logo {
  font-family: 'Bebas Neue';
  color: var(--accent);
  font-size: 22px;
}

.nav-links {
  display:flex;
  gap:20px;
  list-style:none;
}

.nav-links a {
  color: var(--muted);
  text-decoration:none;
  font-size:12px;
}

/ HERO /
.hero {
  height:100vh;
  display:flex;
  align-items:center;
  padding:40px;
}

.hero h1 {
  font-family:'Bebas Neue';
  font-size:90px;
}

.hero span { color:var(--accent); }

/ SECTION /
section {
  padding:80px 40px;
}

.section-title {
  font-family:'Bebas Neue';
  font-size:48px;
  margin-bottom:20px;
}

/ SKILLS /
.skills {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap:10px;
}

.skill {
  padding:20px;
  border:1px solid var(--border);
}

/ CONTACT */
.contact {
  padding:60px;
  border:1px solid var(--border);
}
</style>
</head>

<body>

<nav>
  <div class="nav-logo">NM</div>
  <ul class="nav-links">
    <li><a href="#skills">Skills</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<div class="hero">
  <div>
    <h1>Nilesh <span>Mandal</span></h1>
    <p>Mechanical Engineer | Production Specialist</p>
  </div>
</div>

<section id="skills">
  <h2 class="section-title">Skills</h2>
  <div class="skills">
    <div class="skill">Production</div>
    <div class="skill">Conveyor Systems</div>
    <div class="skill">AutoCAD</div>
    <div class="skill">SolidWorks</div>
  </div>
</section>

<section id="contact">
  <h2 class="section-title">Contact</h2>
  <div class="contact">
    <p>Email: nileshmandal0101@gmail.com</p>
    <p>Phone: 8767130117</p>
  </div>
</section>

</body>
</html>
